<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-1 max-w-7xl mx-auto w-full px-4 pb-12">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Daftar Produk</h2>
        <a th:href="@{/products/new}"
           class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
            + Tambah Produk Baru
        </a>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMessage}"
         class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 mb-4 text-sm">
        ✅ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}"
         class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
        ⚠️ <span th:text="${errorMessage}"></span>
    </div>

    <!-- Product Count -->
    <p class="text-sm text-gray-500 mb-4">
        Total produk: <strong th:text="${#lists.size(products)}" class="text-gray-700">0</strong>
    </p>

    <!-- Product Table -->
    <div th:if="${!#lists.isEmpty(products)}" class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-4 py-3 text-left font-medium">No</th>
                <th class="px-4 py-3 text-left font-medium">Nama</th>
                <th class="px-4 py-3 text-left font-medium">Kategori</th>
                <th class="px-4 py-3 text-left font-medium">Harga</th>
                <th class="px-4 py-3 text-left font-medium">Stok</th>
                <th class="px-4 py-3 text-left font-medium">Status</th>
                <th class="px-4 py-3 text-left font-medium">Aksi</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <tr th:each="product, iterStat : ${products}"
                class="hover:bg-gray-50 transition">
                <td class="px-4 py-3 text-gray-600" th:text="${iterStat.index + 1}">1</td>
                <td class="px-4 py-3 font-medium text-gray-800" th:text="${product.name}">Nama</td>
                <td class="px-4 py-3 text-gray-600" th:text="${product.category?.displayName}">-</td>
                <td class="px-4 py-3 text-gray-600"
                    th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                <td class="px-4 py-3 text-gray-600" th:text="${product.stock}">0</td>
                <td class="px-4 py-3">
                            <span th:if="${product.active}"
                                  class="bg-green-100 text-green-700 text-xs font-semibold px-2.5 py-1 rounded-full">Aktif</span>
                    <span th:unless="${product.active}"
                          class="bg-red-100 text-red-700 text-xs font-semibold px-2.5 py-1 rounded-full">Tidak Aktif</span>
                </td>
                <td class="px-4 py-3">
                    <div class="flex gap-2">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="bg-sky-100 text-sky-700 px-3 py-1 rounded-lg text-xs font-medium hover:bg-sky-200 transition">Detail</a>
                        <a th:href="@{/products/{id}/edit(id=${product.id})}"
                           class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-lg text-xs font-medium hover:bg-yellow-200 transition">Edit</a>
                        <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post"
                              onsubmit="return confirm('Apakah Anda yakin ingin menghapus produk ini?');">
                            <button type="submit"
                                    class="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-xs font-medium hover:bg-red-200 transition cursor-pointer">Hapus</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-16">
        <div class="text-5xl mb-4">📦</div>
        <p class="text-gray-500 text-lg mb-4">Belum ada produk.</p>
        <a th:href="@{/products/new}"
           class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
            Tambah Produk Pertama
        </a>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
