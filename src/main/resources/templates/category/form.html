<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body class="bg-gray-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="bg-white shadow sm:rounded-lg">
        <div class="px-4 py-5 sm:p-6">
            <h3 class="text-2xl font-extrabold text-gray-900 mb-6" th:text="${category.id != null} ? 'Edit Kategori' : 'Tambah Kategori Baru'">
                Form Kategori
            </h3>

            <form th:action="@{/categories/save}" th:object="${category}" method="post">
                <!-- Hidden ID field -->
                <input type="hidden" th:field="*{id}">

                <!-- Nama Kategori -->
                <div class="mb-5">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                        Nama Kategori <span class="text-red-500">*</span>
                    </label>
                    <input type="text" class="form-input block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm"
                           id="name" th:field="*{name}" placeholder="Contoh: Elektronik, Buku, Makanan"
                           required maxlength="100">
                    <p class="mt-1 text-sm text-gray-500">Maksimal 100 karakter</p>
                </div>

                <!-- Deskripsi -->
                <div class="mb-5">
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
                    <textarea class="form-textarea block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm"
                              id="description" th:field="*{description}" rows="4"
                              placeholder="Deskripsi kategori (opsional)" maxlength="1000"></textarea>
                    <p class="mt-1 text-sm text-gray-500">Opsional, maksimal 1000 karakter</p>
                </div>

                <!-- Buttons -->
                <div class="flex items-center justify-end space-x-3 pt-4 border-t border-gray-200">
                    <a th:href="@{/categories}"
                       class="px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition">
                        Batal
                    </a>
                    <button type="submit"
                            class="px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 transition">
                        <span th:text="${category.id != null} ? 'Perbarui Kategori' : 'Simpan Kategori'">Simpan</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
