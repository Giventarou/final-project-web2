<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body class="bg-gray-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-extrabold text-gray-900">Daftar Kategori</h2>
        <a th:href="@{/categories/new}"
           class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 transition duration-150">
            + Tambah Kategori Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="mb-4 p-4 bg-green-100 border-l-4 border-green-500 text-green-700 shadow-sm rounded">
        <div class="flex justify-between">
            <span th:text="${successMessage}"></span>
        </div>
    </div>
    <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 shadow-sm rounded">
        <div class="flex justify-between">
            <span th:text="${errorMessage}"></span>
        </div>
    </div>

    <p class="text-sm text-gray-600 mb-4">
        Total kategori: <span class="font-bold text-gray-800" th:text="${categories.size()}">0</span>
    </p>

    <div th:if="${!#lists.isEmpty(categories)}" class="bg-white shadow overflow-hidden sm:rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">No</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Nama</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Deskripsi</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Jml Produk</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Aksi</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200 text-gray-700">
            <tr th:each="category, iterStat : ${categories}" class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 whitespace-nowrap text-sm" th:text="${iterStat.count}">1</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900" th:text="${category.name}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm" th:text="${category.description}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-mono" th:text="${category.products.size()}">0</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-center font-medium space-x-3">
                    <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="text-yellow-600 hover:text-yellow-900">Edit</a>
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post" class="inline"
                          onsubmit="return confirm('Hapus kategori ini?');">
                        <button type="submit" class="text-red-600 hover:text-red-900">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(categories)}" class="text-center py-24 bg-white border-2 border-dashed border-gray-300 rounded-lg">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7h4z" />
        </svg>
        <h3 class="mt-2 text-sm font-medium text-gray-900">Belum ada kategori</h3>
        <div class="mt-6">
            <a th:href="@{/categories/new}" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                Tambah Kategori Pertama
            </a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
