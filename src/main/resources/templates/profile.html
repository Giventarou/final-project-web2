<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="bg-indigo-700 shadow-md mb-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <a th:href="@{/}" class="text-white text-xl font-bold tracking-wide hover:text-indigo-200 transition">
                🛒 Product CRUD
            </a>
            <div class="flex items-center gap-6">
                <a th:href="@{/}" class="text-indigo-200 hover:text-white text-sm font-medium transition">Home</a>
                <a th:href="@{/products}" class="text-indigo-200 hover:text-white text-sm font-medium transition">Products</a>
                <div sec:authorize="isAuthenticated()" class="relative dropdown">
                    <button class="flex items-center gap-2 text-white text-sm font-medium hover:text-indigo-200 transition cursor-pointer focus:outline-none">
                        <span class="bg-indigo-500 rounded-full w-8 h-8 flex items-center justify-center text-white font-bold"
                              th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
                        <span th:text="${#authentication.name}">User</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg z-50 py-1 border border-gray-100">
                        <div class="px-4 py-2 border-b border-gray-100">
                            <p class="text-xs text-gray-400">Logged in as</p>
                            <p class="text-sm font-semibold text-gray-700 truncate" th:text="${#authentication.name}">User</p>
                        </div>
                        <a th:href="@{/profile}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition">👤 View Profile</a>
                        <a th:href="@{/profile/edit}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition">✏️ Edit Profile</a>
                        <a th:href="@{/change-password}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition">🔒 Change Password</a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="flex items-center gap-2 w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition cursor-pointer">🚪 Logout</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8">

    <!-- Flash Messages -->
    <div th:if="${success}" class="mb-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg" th:text="${success}"></div>
    <div th:if="${error}" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg" th:text="${error}"></div>

    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <!-- Banner -->
        <div class="bg-indigo-700 h-28"></div>

        <div class="px-6 pb-6">

            <!-- Avatar -->
            <div class="-mt-14 mb-4">
                <img th:if="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}"
                     th:src="${user.profileImageUrl}"
                     class="w-24 h-24 rounded-full border-4 border-white shadow-md object-cover" alt="Profile"/>
                <div th:if="${user.profileImageUrl == null or #strings.isEmpty(user.profileImageUrl)}"
                     class="w-24 h-24 rounded-full border-4 border-white shadow-md bg-indigo-500 flex items-center justify-center">
                    <span class="text-white text-3xl font-bold"
                          th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</span>
                </div>
            </div>

            <!-- Nama, Username & Tombol -->
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800"
                        th:text="${user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.username}">Nama</h2>
                    <p class="text-gray-400 text-sm" th:text="'@' + ${user.username}">@username</p>
                </div>
                <!-- Tombol rapi di sebelah kanan nama -->
                <div class="flex gap-2 mt-1">
                    <a th:href="@{/profile/edit}"
                       class="bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
                        ✏️ Edit Profile
                    </a>
                    <a th:href="@{/change-password}"
                       class="bg-yellow-500 text-white text-sm px-4 py-2 rounded-lg hover:bg-yellow-600 transition font-medium">
                        🔒 Change Password
                    </a>
                </div>
            </div>

            <!-- Bio -->
            <div th:if="${user.bio != null and !#strings.isEmpty(user.bio)}"
                 class="mb-4 p-3 bg-gray-50 rounded-lg text-gray-600 text-sm" th:text="${user.bio}"></div>

            <hr class="my-4 border-gray-100"/>

            <!-- Info Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                    <span class="text-indigo-500 text-lg">📧</span>
                    <div>
                        <p class="text-xs text-gray-400">Email</p>
                        <p class="text-sm font-medium text-gray-700"
                           th:text="${user.email != null and !#strings.isEmpty(user.email) ? user.email : '-'}"></p>
                    </div>
                </div>
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                    <span class="text-indigo-500 text-lg">📱</span>
                    <div>
                        <p class="text-xs text-gray-400">Phone Number</p>
                        <p class="text-sm font-medium text-gray-700"
                           th:text="${user.phoneNumber != null and !#strings.isEmpty(user.phoneNumber) ? user.phoneNumber : '-'}"></p>
                    </div>
                </div>
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg sm:col-span-2">
                    <span class="text-indigo-500 text-lg">📍</span>
                    <div>
                        <p class="text-xs text-gray-400">Address</p>
                        <p class="text-sm font-medium text-gray-700"
                           th:text="${user.address != null and !#strings.isEmpty(user.address) ? user.address : '-'}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/products}" class="text-indigo-600 text-sm hover:underline">← Kembali ke Products</a>
    </div>
</div>

<!-- Footer -->
<footer class="mt-12 border-t border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <p class="text-center text-gray-400 text-sm">Product CRUD — Praktikum JPA Fundamentals — 2026</p>
    </div>
</footer>

<script>
    document.querySelectorAll('.dropdown').forEach(dropdown => {
        const menu = dropdown.querySelector('.dropdown-menu');
        dropdown.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('hidden');
        });
    });
    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            menu.classList.add('hidden');
        });
    });
</script>
</body>
</html>
