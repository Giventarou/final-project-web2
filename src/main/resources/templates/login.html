<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">

        <!-- Logo/Title -->
        <div class="text-center mb-6">
            <span class="text-4xl">🛒</span>
            <h2 class="text-2xl font-bold text-gray-800 mt-2">Login</h2>
            <p class="text-gray-500 text-sm mt-1">Masuk ke akun Anda</p>
        </div>

        <!-- Error -->
        <div th:if="${param.error}"
             class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
            ⚠️ Username atau password salah!
        </div>

        <!-- Logout info -->
        <div th:if="${param.logout}"
             class="bg-blue-50 border border-blue-200 text-blue-700 rounded-lg px-4 py-3 mb-4 text-sm">
            ✅ Berhasil logout.
        </div>

        <!-- Success -->
        <div th:if="${success}"
             class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 mb-4 text-sm"
             th:text="${success}">
        </div>

        <!-- Form -->
        <form th:action="@{/login}" method="post" class="space-y-4">

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="Masukkan username" required autofocus>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="Masukkan password" required>
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition text-sm">
                Login
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Belum punya akun?
            <a th:href="@{/register}" class="text-indigo-600 font-medium hover:underline">Daftar di sini</a>
        </p>
    </div>
</div>

</body>
</html>
