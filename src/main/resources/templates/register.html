<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">

        <!-- Logo/Title -->
        <div class="text-center mb-6">
            <span class="text-4xl">📝</span>
            <h2 class="text-2xl font-bold text-gray-800 mt-2">Register</h2>
            <p class="text-gray-500 text-sm mt-1">Buat akun baru</p>
        </div>

        <!-- Error -->
        <div th:if="${error}"
             class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"
             th:text="${error}">
        </div>

        <!-- Form -->
        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" th:field="*{username}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="Masukkan username" required autofocus>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" th:field="*{password}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="Masukkan password" required>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                       placeholder="Ulangi password" required>
            </div>

            <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700 transition text-sm">
                Daftar
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Sudah punya akun?
            <a th:href="@{/login}" class="text-indigo-600 font-medium hover:underline">Login di sini</a>
        </p>
    </div>
</div>

</body>
</html>
