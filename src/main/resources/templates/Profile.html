<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/products">ProductCRUD</a>
        <div class="navbar-nav ms-auto">
            <!-- Dropdown Menu Profile -->
            <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                    👤 <span th:text="${user.username}">Username</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/profile}">View Profile</a></li>
                    <li><a class="dropdown-item" th:href="@{/profile/edit}">Edit Profile</a></li>
                    <li><a class="dropdown-item" th:href="@{/change-password}">Change Password</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item text-danger">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">

                    <!-- Profile Image -->
                    <div class="mb-3">
                        <img th:if="${user.profileImageUrl != null and !user.profileImageUrl.isEmpty()}"
                             th:src="${user.profileImageUrl}"
                             class="rounded-circle" width="120" height="120"
                             style="object-fit: cover;" alt="Profile Picture"/>
                        <!-- Placeholder jika tidak ada foto -->
                        <div th:if="${user.profileImageUrl == null or user.profileImageUrl.isEmpty()}"
                             class="rounded-circle bg-secondary d-inline-flex align-items-center justify-content-center"
                             style="width:120px; height:120px; font-size:48px;">
                            👤
                        </div>
                    </div>

                    <h4 th:text="${user.fullName != null ? user.fullName : user.username}">Nama User</h4>
                    <p class="text-muted" th:text="'@' + ${user.username}">@username</p>

                    <hr/>

                    <div class="text-start">
                        <p><strong>Email:</strong>
                            <span th:text="${user.email != null ? user.email : '-'}"></span></p>
                        <p><strong>Phone:</strong>
                            <span th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}"></span></p>
                        <p><strong>Address:</strong>
                            <span th:text="${user.address != null ? user.address : '-'}"></span></p>
                        <p><strong>Bio:</strong>
                            <span th:text="${user.bio != null ? user.bio : '-'}"></span></p>
                    </div>

                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <a th:href="@{/profile/edit}" class="btn btn-primary">Edit Profile</a>
                        <a th:href="@{/change-password}" class="btn btn-warning">Change Password</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
