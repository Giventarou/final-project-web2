<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-2xl mx-auto px-4 py-8">

    <div class="bg-white rounded-2xl shadow-md overflow-hidden">

        <!-- Card Header -->
        <div class="bg-indigo-700 px-6 py-4">
            <h2 class="text-white text-xl font-bold">✏️ Edit Profile</h2>
            <p class="text-indigo-200 text-sm">Update informasi profil kamu</p>
        </div>

        <!-- Form -->
        <div class="px-6 py-6">
            <form th:action="@{/profile/edit}" th:object="${updateProfileRequest}" method="post"
                  enctype="multipart/form-data" class="space-y-4">

                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text"
                           th:field="*{fullName}"
                           placeholder="Masukkan nama lengkap"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email"
                           th:field="*{email}"
                           placeholder="email@example.com"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
                </div>

                <!-- Phone Number -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="text"
                           th:field="*{phoneNumber}"
                           placeholder="08xxxxxxxxxx"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
                </div>

                <!-- Address -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <input type="text"
                           th:field="*{address}"
                           placeholder="Masukkan alamat"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"/>
                </div>

                <!-- Bio -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
                    <textarea th:field="*{bio}"
                              rows="3"
                              placeholder="Ceritakan tentang diri kamu..."
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"></textarea>
                </div>

                <!-- Foto Profil -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Foto Profil</label>

                    <!-- Preview foto saat ini -->
                    <div class="mb-3">
                        <img th:if="${updateProfileRequest.profileImageUrl != null and !#strings.isEmpty(updateProfileRequest.profileImageUrl)}"
                             th:src="${updateProfileRequest.profileImageUrl}"
                             class="w-20 h-20 rounded-full object-cover border-2 border-indigo-300"
                             alt="Current Profile"/>
                        <div th:if="${updateProfileRequest.profileImageUrl == null or #strings.isEmpty(updateProfileRequest.profileImageUrl)}"
                             class="w-20 h-20 rounded-full bg-indigo-500 flex items-center justify-center">
                            <span class="text-white text-2xl font-bold"
                                  th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">U</span>
                        </div>
                    </div>

                    <!-- Input file upload -->
                    <input type="file"
                           name="profileImageFile"
                           accept="image/*"
                           onchange="previewImage(this)"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition cursor-pointer"/>
                    <p class="text-xs text-gray-400 mt-1">Format: JPG, PNG, GIF. Maksimal 5MB</p>

                    <!-- Preview gambar baru sebelum disimpan -->
                    <div class="mt-2 hidden" id="previewContainer">
                        <p class="text-xs text-gray-500 mb-1">Preview foto baru:</p>
                        <img id="imagePreview" src="#" alt="Preview"
                             class="w-20 h-20 rounded-full object-cover border-2 border-green-400"/>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="bg-indigo-600 text-white text-sm px-6 py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
                        💾 Simpan Perubahan
                    </button>
                    <a th:href="@{/profile}"
                       class="bg-gray-100 text-gray-700 text-sm px-6 py-2 rounded-lg hover:bg-gray-200 transition font-medium">
                        Batal
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                container.classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
