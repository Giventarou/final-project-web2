<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
<nav th:fragment="navbar" class="bg-gray-800 shadow-md mb-8"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center">
                <a class="text-white font-bold text-xl tracking-tight" th:href="@{/}">Product CRUD</a>
                <div class="hidden md:block ml-10 flex items-baseline space-x-4">
                    <a th:href="@{/}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition">Home</a>
                    <a th:href="@{/categories}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition">Categories</a>
                    <a th:href="@{/products}" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition">Products</a>
                </div>
            </div>

            <div class="flex items-center" sec:authorize="isAuthenticated()">
                    <span class="text-gray-300 text-sm mr-4 italic">
                        Halo, <strong class="text-white" th:text="${#authentication.name}">User</strong>
                    </span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium transition duration-200">
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="mt-auto py-8 bg-white border-t border-gray-200">
    <div class="max-w-6xl mx-auto px-4">
        <p class="text-center text-gray-500 text-sm uppercase tracking-widest">
            Product CRUD
        </p>
    </div>
</footer>
</body>
</html>
